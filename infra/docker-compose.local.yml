name: multi-project-local

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-postgres}
      POUPI_BABY_DB: ${POUPI_BABY_DB:-poupi_baby_db}
      POUPI_BABY_DB_USER: ${POUPI_BABY_DB_USER:-poupi_baby_user}
      POUPI_BABY_DB_PASSWORD: ${POUPI_BABY_DB_PASSWORD:-poupi_baby_password}
      DATA_CORE_DB: ${DATA_CORE_DB:-data_core_db}
      DATA_CORE_DB_USER: ${DATA_CORE_DB_USER:-data_core_user}
      DATA_CORE_DB_PASSWORD: ${DATA_CORE_DB_PASSWORD:-data_core_password}
      TRADING_BOT_DB: ${TRADING_BOT_DB:-trading_bot_db}
      TRADING_BOT_DB_USER: ${TRADING_BOT_DB_USER:-trading_bot_user}
      TRADING_BOT_DB_PASSWORD: ${TRADING_BOT_DB_PASSWORD:-trading_bot_password}
      ANALYTICS_DB: ${ANALYTICS_DB:-analytics_db}
      ANALYTICS_DB_USER: ${ANALYTICS_DB_USER:-analytics_user}
      ANALYTICS_DB_PASSWORD: ${ANALYTICS_DB_PASSWORD:-analytics_password}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./shared/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - shared

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis_password}", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - shared

networks:
  shared:
    name: multi_project_local

volumes:
  postgres-data:
  redis-data:
