services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      API_KEY_ENABLED: ${API_KEY_ENABLED:-true}
      API_KEY: ${API_KEY}
      SCHEDULER_ENABLED: "false"
      POUPI_LEGACY_BACKEND_DIR: ${POUPI_LEGACY_BACKEND_DIR:-/app/domains/poupi_baby/backend}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
    expose:
      - "8000"
    command: sh -c "alembic upgrade head && uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8000"
    # ── Resource limits ───────────────────────────────────────────────────────
    # api: FastAPI + SQLAlchemy pool (5 conns). 512 MiB is comfortable headroom;
    # memswap = limit + 256 MiB swap buffer so an occasional spike doesn't OOM.
    mem_limit: 512m
    memswap_limit: 768m
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\", timeout=5).read()'"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      app:
      infra_internal:
        aliases:
          - data-core-api
    volumes:
      - runtime-logs:/app/runtime-logs
      - runtime-data:/app/runtime-data

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      API_KEY_ENABLED: ${API_KEY_ENABLED:-true}
      API_KEY: ${API_KEY}
      SCHEDULER_ENABLED: "true"
      SCHEDULER_COLLECTORS_ENABLED: ${SCHEDULER_COLLECTORS_ENABLED:-true}
      SCHEDULER_PIPELINE_ENABLED: ${SCHEDULER_PIPELINE_ENABLED:-true}
      SCHEDULER_DOMAIN_JOBS_ENABLED: ${SCHEDULER_DOMAIN_JOBS_ENABLED:-true}
      POUPI_LEGACY_BACKEND_DIR: ${POUPI_LEGACY_BACKEND_DIR:-/app/domains/poupi_baby/backend}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      # Watchdog + Telegram
      WATCHDOG_ENABLED: ${WATCHDOG_ENABLED:-true}
      WATCHDOG_HEARTBEAT_HOURS: ${WATCHDOG_HEARTBEAT_HOURS:-6}
      WATCHDOG_COLLECTION_STALE_HOURS: ${WATCHDOG_COLLECTION_STALE_HOURS:-3}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    command: sh -c "python -m app.jobs.scheduler_runner"
    # ── Resource limits ───────────────────────────────────────────────────────
    # scheduler: APScheduler + persistent async loop + collector threads.
    # 768 MiB is the OOM-kill safety net; with the Phase 0.6 asyncio.run() fix
    # steady-state RSS is ~180 MiB so this gives 4× headroom.
    # memswap = 1024 MiB (limit + 256 MiB swap) to survive transient bursts
    # without killing the container outright.
    mem_limit: 1024m
    memswap_limit: 1280m
    healthcheck:
      # Pass if scheduler_heartbeat.json was written within the last 10 minutes.
      # The heartbeat job fires every 5 min; 10 min tolerance covers one missed tick.
      test:
        - CMD-SHELL
        - >-
          python3 -c '
          import json, datetime, pathlib;
          p = pathlib.Path("/app/runtime-data/scheduler_heartbeat.json");
          d = json.loads(p.read_text());
          t = datetime.datetime.fromisoformat(d["written_at"][:26]);
          age = (datetime.datetime.utcnow() - t).total_seconds();
          assert age < 600, f"stale: {age:.0f}s"
          '
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    depends_on:
      api:
        condition: service_healthy
    networks:
      app:
      infra_internal:
    volumes:
      - runtime-logs:/app/runtime-logs
      - runtime-data:/app/runtime-data

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      API_KEY_ENABLED: ${API_KEY_ENABLED:-true}
      API_KEY: ${API_KEY}
      SCHEDULER_ENABLED: "false"
      WORKER_PIPELINE_INTERVAL_SECONDS: ${WORKER_PIPELINE_INTERVAL_SECONDS:-300}
      POUPI_LEGACY_BACKEND_DIR: ${POUPI_LEGACY_BACKEND_DIR:-/app/domains/poupi_baby/backend}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
    command: sh -c "python -m app.jobs.worker --interval $${WORKER_PIPELINE_INTERVAL_SECONDS:-300}"
    # ── Resource limits ───────────────────────────────────────────────────────
    # worker: pipeline normalize/analytics batches. 512 MiB handles peak batch
    # loads; memswap = 768 MiB.
    mem_limit: 512m
    memswap_limit: 768m
    healthcheck:
      # Pass if worker_heartbeat.json epoch timestamp is less than ~11.5 min old.
      # Worker heartbeat fires every 5 min; 700s tolerance covers one missed tick.
      test:
        - CMD-SHELL
        - >-
          python3 -c '
          import json, time, pathlib;
          p = pathlib.Path("/app/runtime-data/worker_heartbeat.json");
          d = json.loads(p.read_text());
          age = time.time() - float(d["timestamp_epoch"]);
          assert age < 700, f"stale: {age:.0f}s"
          '
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      api:
        condition: service_healthy
    networks:
      app:
      infra_internal:
    volumes:
      - runtime-logs:/app/runtime-logs
      - runtime-data:/app/runtime-data

networks:
  app:
    name: data_core_app
  infra_internal:
    external: true

volumes:
  runtime-logs:
  runtime-data:
