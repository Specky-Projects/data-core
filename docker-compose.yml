services:
  api:
    build: .
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/app
      - ./runtime-logs:/app/runtime-logs
      - ./runtime-data:/app/runtime-data
    command: sh -c "alembic upgrade head && uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8000"

  tests:
    image: data-core-api
    profiles:
      - test
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/app
    command: sh -c "python -m pip install pytest==8.3.3 && alembic upgrade head && pytest -q"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: data_core
      POSTGRES_USER: data_core
      POSTGRES_PASSWORD: data_core
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U data_core -d data_core"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
