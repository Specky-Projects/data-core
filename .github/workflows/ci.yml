name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff==0.6.8

      # The full tree carries pre-existing lint/format debt (baseline, tracked
      # separately). Scoping ruff to the files a change actually touches keeps
      # the gate meaningful for new/modified code without requiring a global
      # sanitization pass before CI can be green again.
      - name: Determine changed Python files
        id: changed
        run: |
          ZERO_SHA="0000000000000000000000000000000000000000"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          if [ -z "$BASE" ] || [ "$BASE" = "$ZERO_SHA" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            BASE=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          fi
          if [ -z "$BASE" ]; then
            FILES=$(git ls-files '*.py')
          else
            FILES=$(git diff --name-only --diff-filter=ACMR "$BASE" HEAD -- '*.py')
          fi
          FILES=$(echo "$FILES" | grep -v '^$' | while read -r f; do [ -f "$f" ] && echo "$f"; done || true)
          echo "count=$(echo "$FILES" | grep -c . || true)" >> "$GITHUB_OUTPUT"
          {
            echo "files<<CHANGED_FILES_EOF"
            echo "$FILES"
            echo "CHANGED_FILES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Lint changed files
        if: steps.changed.outputs.count != '0'
        run: echo "${{ steps.changed.outputs.files }}" | xargs ruff check

      - name: Format check changed files
        if: steps.changed.outputs.count != '0'
        run: echo "${{ steps.changed.outputs.files }}" | xargs ruff format --check

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: data_core
          POSTGRES_USER: data_core
          POSTGRES_PASSWORD: data_core
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U data_core -d data_core"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://data_core:data_core@localhost:5433/data_core
      TEST_DATABASE_URL: postgresql+psycopg://data_core:data_core@localhost:5433/data_core
      APP_ENV: test
      AUTO_CREATE_TABLES: "true"
      SCHEDULER_ENABLED: "false"
      CACHE_ENABLED: "false"
      API_KEY_ENABLED: "false"
      # Poupi legacy collector tests mock subprocess; only the env var needs to exist
      POUPI_LEGACY_BACKEND_DIR: /tmp/poupi-legacy-stub

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Validate Alembic migration chain
        run: |
          alembic upgrade head
          alembic check

      - name: Run tests
        run: pytest -q --tb=short
